<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人简介</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .tagline {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .section {
            margin-bottom: 30px;
            text-align: left;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }

        .intro-text {
            color: #555;
            line-height: 1.8;
            font-size: 15px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .contact-btn {
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .contact-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .contact-btn.secondary {
            background: #f0f0f0;
            color: #667eea;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 30px 20px;
            }

            .name {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar">邢</div>

        <h1 class="name">邢春英</h1>
        <p class="tagline">市场营销专业大三学生 | 新媒体运营爱好者</p>

        <div class="section">
            <h2 class="section-title">个人介绍</h2>
            <p class="intro-text">
                就读于广东科技学院市场营销专业，热爱品牌策划与新媒体运营。
                擅长内容创作与用户运营，喜欢用数据驱动营销决策，探索Z世代用户的消费行为与沟通方式。
            </p>
        </div>

        <div class="section">
            <h2 class="section-title">技能标签</h2>
            <div class="skills">
                <span class="skill-tag">新媒体运营</span>
                <span class="skill-tag">品牌营销</span>
                <span class="skill-tag">内容策划</span>
                <span class="skill-tag">数据分析</span>
                <span class="skill-tag">SPSS统计</span>
                <span class="skill-tag">小红书运营</span>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">联系方式</h2>
            <div class="contact-links">
                <a href="#" class="contact-btn primary">邮箱联系</a>
                <a href="#" class="contact-btn secondary">查看简历</a>
            </div>
        </div>
    </div>
</body>
</html>
